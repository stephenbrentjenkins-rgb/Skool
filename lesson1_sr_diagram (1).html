<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 1 — Support & Resistance Diagram</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 32px 24px;
    max-width: 760px;
    margin: 0 auto;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #141414; color: #e8e6e0; }
    button { background: #1e1e1e; color: #e8e6e0; border-color: #3a3a3a; }
    button:hover { background: #2a2a2a; }
    button.active { background: #2c2c2c; border-color: #666; }
    svg rect[fill="#f8f8f8"] { fill: #1e1e1e; }
  }
  h2 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
    color: inherit;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  button {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #d0d0d0;
    background: #f5f5f5;
    color: #1a1a1a;
    cursor: pointer;
    transition: background 0.1s;
  }
  button:hover { background: #ebebeb; }
  button.active {
    background: #ffffff;
    border-color: #999;
    font-weight: 500;
  }
  .chart-wrap {
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    padding: 16px;
    background: #fafafa;
  }
  @media (prefers-color-scheme: dark) {
    .chart-wrap { background: #1a1a1a; border-color: #2e2e2e; }
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #666;
  }
  .leg-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h2>Support &amp; Resistance</h2>
<p class="subtitle">Lesson 1 — The floor and the ceiling</p>

<div class="controls">
  <button class="active" onclick="setView('both',this)">Show both</button>
  <button onclick="setView('support',this)">Support only</button>
  <button onclick="setView('resistance',this)">Resistance only</button>
</div>

<div class="chart-wrap">
  <svg id="chart" width="100%" viewBox="0 0 680 340">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <rect x="40" y="20" width="600" height="280" rx="6" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>

    <line id="res-line" x1="40" y1="90" x2="640" y2="90" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 4" opacity="1"/>
    <line id="sup-line" x1="40" y1="250" x2="640" y2="250" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="6 4" opacity="1"/>

    <polyline id="price-line" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      points="55,200 95,170 130,220 165,155 200,240 240,200 275,135 310,100 330,92 355,100 375,130 410,90 430,98 455,80 480,90 510,115 540,90 570,105 610,120 635,150"/>

    <circle id="b1" cx="130" cy="250" r="5" fill="#0F6E56" opacity="1"/>
    <circle id="b2" cx="200" cy="250" r="5" fill="#0F6E56" opacity="1"/>
    <circle id="b3" cx="510" cy="250" r="5" fill="#0F6E56" opacity="1"/>

    <line id="b1v" x1="130" y1="220" x2="130" y2="248" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 2" opacity="1" marker-end="url(#arr)"/>
    <line id="b2v" x1="200" y1="240" x2="200" y2="248" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 2" opacity="1" marker-end="url(#arr)"/>

    <circle id="r1" cx="310" cy="90" r="5" fill="#534AB7" opacity="1"/>
    <circle id="r2" cx="410" cy="90" r="5" fill="#534AB7" opacity="1"/>
    <circle id="r3" cx="540" cy="90" r="5" fill="#534AB7" opacity="1"/>

    <line id="r1v" x1="310" y1="100" x2="310" y2="92" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 2" opacity="1" marker-end="url(#arr)"/>
    <line id="r2v" x1="410" y1="95" x2="410" y2="92" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 2" opacity="1" marker-end="url(#arr)"/>
    <line id="r3v" x1="540" y1="95" x2="540" y2="92" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 2" opacity="1" marker-end="url(#arr)"/>

    <text id="res-label" x="52" y="82" fill="#534AB7" font-size="12" font-family="-apple-system, sans-serif" opacity="1">Resistance (ceiling) — sellers show up here</text>
    <text id="sup-label" x="52" y="244" fill="#0F6E56" font-size="12" font-family="-apple-system, sans-serif" opacity="1">Support (floor) — buyers show up here</text>

    <text x="648" y="94" font-size="11" fill="#534AB7" font-family="-apple-system, sans-serif">$65</text>
    <text x="648" y="254" font-size="11" fill="#0F6E56" font-family="-apple-system, sans-serif">$50</text>

    <text x="340" y="315" text-anchor="middle" font-size="12" fill="#aaa" font-family="-apple-system, sans-serif">Time →</text>
    <text x="30" y="170" text-anchor="middle" font-size="12" fill="#aaa" font-family="-apple-system, sans-serif" transform="rotate(-90,30,170)">Price</text>
  </svg>
</div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>Resistance — ceiling ($65)</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>Support — floor ($50)</div>
  <div class="leg-item"><div class="leg-dot" style="background:#888"></div>Price action</div>
</div>

<script>
function setView(mode, btn) {
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const showSup = mode === 'both' || mode === 'support';
  const showRes = mode === 'both' || mode === 'resistance';
  const ids_sup = ['sup-line','sup-label','b1','b2','b3','b1v','b2v'];
  const ids_res = ['res-line','res-label','r1','r2','r3','r1v','r2v','r3v'];
  ids_sup.forEach(id => document.getElementById(id).setAttribute('opacity', showSup ? '1' : '0'));
  ids_res.forEach(id => document.getElementById(id).setAttribute('opacity', showRes ? '1' : '0'));
}
</script>
</body>
</html>
